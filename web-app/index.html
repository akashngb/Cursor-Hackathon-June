<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Cam 📸</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
      gap: 12px;
    }

    h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.05em; }

    .customer-row {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 640px;
    }

    .customer-row input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      padding: 8px 12px;
      font-size: 0.85rem;
    }

    .customer-row input::placeholder { color: #555; }

    .cam-wrap {
      position: relative;
      width: 100%;
      max-width: 640px;
      border-radius: 12px;
      overflow: hidden;
      background: #111;
      aspect-ratio: 4/3;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scaleX(-1); /* mirror for selfie feel */
    }

    #overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #preview-flash {
      position: absolute;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.05s ease;
      border-radius: 12px;
    }

    #shutter {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #fff;
      border: 4px solid #888;
      cursor: pointer;
      font-size: 1.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s, background 0.1s;
      flex-shrink: 0;
    }

    #shutter:active { transform: scale(0.92); background: #e0e0e0; }
    #shutter:disabled { opacity: 0.4; cursor: not-allowed; }

    #status {
      font-size: 0.9rem;
      color: #aaa;
      min-height: 1.4em;
      text-align: center;
    }

    #status.ok { color: #4ade80; }
    #status.err { color: #f87171; }

    #result-preview {
      max-width: 320px;
      width: 100%;
      border-radius: 10px;
      display: none;
      border: 2px solid #333;
    }

    .response-box {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 12px 16px;
      width: 100%;
      max-width: 640px;
      font-size: 0.8rem;
      color: #888;
      display: none;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 160px;
      overflow-y: auto;
    }

    /* hidden scratch canvas */
    #scratch { display: none; }
  </style>
</head>
<body>
  <h1>Wedding Cam 📸</h1>

  <div class="customer-row">
    <input id="cust-name" type="text" placeholder="Customer name" value="Demo Guest" />
    <input id="cust-email" type="email" placeholder="Customer email" value="guest@wedding.com" />
  </div>

  <div class="cam-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <div id="preview-flash"></div>
  </div>

  <button id="shutter">📷</button>
  <div id="status">Starting camera…</div>

  <img id="result-preview" alt="Captured photo with stickers" />
  <pre class="response-box" id="response-box"></pre>

  <canvas id="scratch"></canvas>

  <script>
    const video    = document.getElementById('video');
    const overlay  = document.getElementById('overlay');
    const flash    = document.getElementById('preview-flash');
    const shutter  = document.getElementById('shutter');
    const status   = document.getElementById('status');
    const preview  = document.getElementById('result-preview');
    const respBox  = document.getElementById('response-box');
    const scratch  = document.getElementById('scratch');
    const octx     = overlay.getContext('2d');
    const sctx     = scratch.getContext('2d');

    const SERVER   = 'http://127.0.0.1:8000';

    // ── Camera setup ──────────────────────────────────────────────
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 960 } },
          audio: false,
        });
        video.srcObject = stream;
        await new Promise(r => video.onloadedmetadata = r);
        video.play();
        syncCanvasSize();
        status.textContent = 'Ready — smile! 😄';
        shutter.disabled = false;
      } catch (e) {
        status.textContent = 'Camera access denied: ' + e.message;
        status.className = 'err';
      }
    }

    function syncCanvasSize() {
      overlay.width  = video.videoWidth;
      overlay.height = video.videoHeight;
      scratch.width  = video.videoWidth;
      scratch.height = video.videoHeight;
    }

    // ── Face detection ─────────────────────────────────────────────
    // Uses FaceDetector API (Chrome 123+) with a center-screen fallback.
    async function detectFaces(source, w, h) {
      if ('FaceDetector' in window) {
        try {
          const fd = new FaceDetector({ fastMode: true, maxDetectedFaces: 8 });
          const results = await fd.detect(source);
          if (results.length > 0) return results.map(r => r.boundingBox);
        } catch (_) { /* fall through */ }
      }
      // Fallback: one face assumed, centered in upper 2/3 of frame
      return [{
        x: w * 0.22, y: h * 0.08,
        width: w * 0.56, height: h * 0.60,
      }];
    }

    // ── Sticker drawing ────────────────────────────────────────────
    const SETS = ['cat', 'dog', 'party', 'alien'];

    function drawCatEars(ctx, x, y, w) {
      const earW = w * 0.22, earH = w * 0.22;
      // left ear
      ctx.beginPath();
      ctx.moveTo(x + w * 0.12, y - earH * 0.1);
      ctx.lineTo(x + w * 0.12 + earW / 2, y - earH);
      ctx.lineTo(x + w * 0.12 + earW, y - earH * 0.1);
      ctx.closePath();
      ctx.fillStyle = '#ff9ec8';
      ctx.fill();
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 2;
      ctx.stroke();
      // right ear
      ctx.beginPath();
      ctx.moveTo(x + w * 0.88 - earW, y - earH * 0.1);
      ctx.lineTo(x + w * 0.88 - earW / 2, y - earH);
      ctx.lineTo(x + w * 0.88, y - earH * 0.1);
      ctx.closePath();
      ctx.fillStyle = '#ff9ec8';
      ctx.fill();
      ctx.stroke();
    }

    function drawDogEars(ctx, x, y, w, h) {
      const earW = w * 0.28, earH = h * 0.42;
      // left ear — rounded rect hanging down-left
      ctx.beginPath();
      ctx.roundRect(x - earW * 0.5, y + h * 0.05, earW, earH, earW * 0.4);
      ctx.fillStyle = '#c8860a';
      ctx.fill();
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 2;
      ctx.stroke();
      // right ear
      ctx.beginPath();
      ctx.roundRect(x + w - earW * 0.5, y + h * 0.05, earW, earH, earW * 0.4);
      ctx.fillStyle = '#c8860a';
      ctx.fill();
      ctx.stroke();
    }

    function drawEmoji(ctx, emoji, cx, cy, size) {
      ctx.save();
      ctx.font = `${size}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(emoji, cx, cy);
      ctx.restore();
    }

    function applyStickers(ctx, faces, w, h) {
      faces.forEach(bb => {
        const set = SETS[Math.floor(Math.random() * SETS.length)];
        const cx  = bb.x + bb.width / 2;

        ctx.save();
        if (set === 'cat') {
          drawCatEars(ctx, bb.x, bb.y, bb.width);
          // pink nose dot
          ctx.beginPath();
          ctx.arc(cx, bb.y + bb.height * 0.62, bb.width * 0.045, 0, Math.PI * 2);
          ctx.fillStyle = '#ff9ec8';
          ctx.fill();
          // whisker lines
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 1.5;
          for (const side of [-1, 1]) {
            for (const angle of [-0.15, 0, 0.15]) {
              ctx.save();
              ctx.translate(cx, bb.y + bb.height * 0.62);
              ctx.rotate(side * (Math.PI / 2 - angle));
              ctx.beginPath();
              ctx.moveTo(0, 0);
              ctx.lineTo(side * bb.width * 0.28, 0);
              ctx.stroke();
              ctx.restore();
            }
          }
        } else if (set === 'dog') {
          drawDogEars(ctx, bb.x, bb.y, bb.width, bb.height);
          // black nose ellipse
          ctx.beginPath();
          ctx.ellipse(cx, bb.y + bb.height * 0.62, bb.width * 0.07, bb.width * 0.05, 0, 0, Math.PI * 2);
          ctx.fillStyle = '#111';
          ctx.fill();
        } else if (set === 'party') {
          drawEmoji(ctx, '🎉', cx, bb.y - bb.width * 0.12, bb.width * 0.55);
          drawEmoji(ctx, '🥳', cx, bb.y + bb.height * 0.45, bb.width * 0.55);
        } else {
          // alien
          drawEmoji(ctx, '👽', cx, bb.y - bb.width * 0.12, bb.width * 0.55);
          drawEmoji(ctx, '✨', bb.x + bb.width * 0.1, bb.y + bb.height * 0.2, bb.width * 0.3);
          drawEmoji(ctx, '✨', bb.x + bb.width * 0.9, bb.y + bb.height * 0.2, bb.width * 0.3);
        }
        ctx.restore();
      });
    }

    // ── Capture + send ─────────────────────────────────────────────
    shutter.disabled = true;
    shutter.addEventListener('click', async () => {
      shutter.disabled = true;
      status.className = '';
      status.textContent = 'Detecting faces…';

      const w = video.videoWidth, h = video.videoHeight;
      syncCanvasSize();

      // Draw mirrored video frame to scratch canvas
      sctx.save();
      sctx.translate(w, 0);
      sctx.scale(-1, 1);
      sctx.drawImage(video, 0, 0, w, h);
      sctx.restore();

      // Detect faces on the mirrored frame
      const faces = await detectFaces(scratch, w, h);

      // Apply stickers
      applyStickers(sctx, faces, w, h);

      // Flash effect
      flash.style.opacity = '0.85';
      setTimeout(() => (flash.style.opacity = '0'), 120);

      // Convert to base64 (strip data-URL prefix)
      const dataURL   = scratch.toDataURL('image/jpeg', 0.88);
      const b64       = dataURL.replace(/^data:image\/\w+;base64,/, '');

      // Show preview
      preview.src    = dataURL;
      preview.style.display = 'block';

      // Build request
      const jobId    = 'job-' + Date.now();
      const imgId    = 'img-' + Date.now();
      const name     = document.getElementById('cust-name').value.trim() || 'Demo Guest';
      const email    = document.getElementById('cust-email').value.trim() || 'guest@wedding.com';

      const body = {
        job_id: jobId,
        customer: { name, email },
        images: [{ id: imgId, data: b64 }],
      };

      status.textContent = 'Sending to server…';

      try {
        const res  = await fetch(`${SERVER}/webhook/capture`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const json = await res.json();
        if (!res.ok) throw new Error(JSON.stringify(json));

        status.className = 'ok';
        status.textContent = `✓ Sent! Total value: $${json.total_value} (job ${json.job_id})`;
        respBox.style.display = 'block';
        respBox.textContent = JSON.stringify(json, null, 2);
      } catch (e) {
        status.className = 'err';
        status.textContent = '✗ Send failed: ' + e.message;
        respBox.style.display = 'block';
        respBox.textContent = String(e);
      }

      shutter.disabled = false;
    });

    startCamera();
  </script>
</body>
</html>
